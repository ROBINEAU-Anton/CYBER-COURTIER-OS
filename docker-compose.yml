version: '3.8'

services:
  game-worker:
    build:
      context: ./tick-engine
      dockerfile: Dockerfile
    environment:
      - REDIS_URL=redis://192.168.1.96:6379
      - DATABASE_URL=postgres://user_cyber:password_cyber@192.168.1.96:5432/cyber_db
    restart: always

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    environment:
      - REDIS_URL=redis://192.168.1.96:6379
      - DATABASE_URL=postgres://user_cyber:password_cyber@192.168.1.96:5432/cyber_db
      - PORT=3000
    ports:
      - "3000:3000"
    restart: always

  # sim-engine:
  #   build:
  #     context: ./sim-engine
  #     dockerfile: Dockerfile
  #   environment:
  #     - REDIS_URL=redis://192.168.1.96:6379
  #     - DATABASE_URL=postgres://user_cyber:password_cyber@192.168.1.96:5432/cyber_db
  #   restart: always

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "5173:80" # Exposed on 5173 to match Vite's default dev port since it's hardcoded in api-gateway CORS, or 80. Wait, api-gateway CORS allows localhost:5173.
    restart: always
